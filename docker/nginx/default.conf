server {
    listen 80;
    server_name localhost;

    # Seul le dossier public est accessible depuis le web
    root /var/www/html/public;
    index index.php;

    # Logs
    access_log /var/log/nginx/vg_access.log;
    error_log /var/log/nginx/vg_error.log;

    # Toutes les requêtes passent par index.php (routeur central)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|sql|md|json|lock)$ {
        deny all;
    }

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
