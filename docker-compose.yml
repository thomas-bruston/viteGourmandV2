services:

  # PHP 8.3 + extensions
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vg_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - mongo
    networks:
      - vg_network
    environment:
      - APP_ENV=development

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: vg_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - vg_network

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: vg_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - vg_mysql_data:/var/lib/mysql
      - ./sql/create.sql:/docker-entrypoint-initdb.d/01_create.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - vg_network

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: vg_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - vg_mongo_data:/data/db
    networks:
      - vg_network

  # PhpMyAdmin (dev uniquement)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vg_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    networks:
      - vg_network

volumes:
  vg_mysql_data:
  vg_mongo_data:

networks:
  vg_network:
    driver: bridge
